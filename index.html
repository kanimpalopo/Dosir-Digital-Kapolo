<html lang="id">
<head>
<meta charset="UTF-8">

<title>Dosir Digital Pegawai — Kantor Imigrasi Kelas II Non TPI Palopo</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f6f8;
    --surface: #ffffff;
    --border: #e4e7ec;
    --border-light: #f0f2f5;
    --text-primary: #101828;
    --text-secondary: #667085;
    --text-tertiary: #98a2b3;
    --accent: #1a56a4;
    --accent-hover: #154899;
    --accent-light: #e6f1fb;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --shadow-sm: 0 1px 3px rgba(16,24,40,.06), 0 1px 2px rgba(16,24,40,.04);
    --shadow-md: 0 4px 12px rgba(16,24,40,.08), 0 2px 4px rgba(16,24,40,.04);
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* ── Header ── */
  .site-header {
    background: var(--accent);
    color: #fff;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 8px rgba(26,86,164,.25);
  }
  .site-header .logo {
    width: 44px; height: 44px;
    background: rgba(255,255,255,.15);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .site-header h1 { font-size: 16px; font-weight: 700; line-height: 1.2; }
  .site-header p  { font-size: 12px; opacity: .75; margin-top: 2px; }

  /* ── Main Container ── */
  .container { max-width: 1280px; margin: 0 auto; padding: 28px 24px; }

  /* ── Search & Filter ── */
  .toolbar { margin-bottom: 20px; }
  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-wrap input {
    width: 100%; padding: 11px 16px 11px 42px;
    font-family: inherit; font-size: 14px;
    background: var(--surface); color: var(--text-primary);
    border: 1px solid var(--border); border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm);
    outline: none; transition: border-color .2s, box-shadow .2s;
  }
  .search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(26,86,164,.12);
  }
  .search-wrap input::placeholder { color: var(--text-tertiary); }
  .search-icon {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px; color: var(--text-tertiary); pointer-events: none;
  }
  .filter-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .filter-btn {
    font-family: inherit; font-size: 12px; font-weight: 500;
    padding: 5px 12px; border-radius: 999px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-secondary); cursor: pointer;
    transition: all .15s; white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── Stats ── */
  .stats { font-size: 13px; color: var(--text-secondary); margin-bottom: 18px; }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow .2s, transform .2s;
  }
  .card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .avatar {
    width: 42px; height: 42px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
    overflow: hidden;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .card-name { font-size: 13.5px; font-weight: 600; color: var(--text-primary); line-height: 1.3; }
  .card-sub  { font-size: 11.5px; color: var(--text-secondary); margin-top: 2px; }
  .divider   { border: none; border-top: 1px solid var(--border-light); margin-bottom: 10px; }
  .cat-label { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-tertiary); margin-bottom: 7px; font-weight: 600; }
  .tags      { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
  .tag {
    font-size: 10.5px; padding: 3px 8px; border-radius: 999px;
    border: 1px solid var(--border); color: var(--text-secondary);
    background: var(--bg); text-decoration: none; display: inline-block;
    font-weight: 500; transition: all .15s;
  }
  .tag.clickable:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tag.missing { opacity: .28; text-decoration: line-through; pointer-events: none; }
  .folder-btn {
    display: flex; align-items: center; justify-content: center; gap: 7px;
    width: 100%; padding: 8px 14px;
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius-md);
    font-family: inherit; font-size: 12.5px; font-weight: 600;
    text-decoration: none; cursor: pointer;
    transition: background .15s;
  }
  .folder-btn:hover { background: var(--accent-hover); }

  /* ── Empty ── */
  .empty {
    grid-column: 1/-1; text-align: center;
    padding: 4rem 1rem; color: var(--text-tertiary);
    font-size: 14px;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .site-header { padding: 16px 20px; }
    .container { padding: 20px 16px; }
  }
</style>
</head>

let activeFilter=null;
function initials(n){return n.split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();}
function avatarHTML(p){
  const c=COLORS[(p.no-1)%COLORS.length];
  if(p.foto) return `<div class="avatar"><img src="${p.foto}" alt="${p.nama}" onerror="this.parentElement.innerHTML='<span>${initials(p.nama)}</span>';this.parentElement.style.background='${c.bg}';this.parentElement.style.color='${c.text}';"/></div>`;
  return `<div class="avatar" style="background:${c.bg};color:${c.text}">${initials(p.nama)}</div>`;
}
function renderCards(list){
  const grid=document.getElementById("grid");
  document.getElementById("stats").textContent=list.length+" dari "+pegawai.length+" pegawai ditemukan";
  if(!list.length){grid.innerHTML='<div class="empty">Tidak ada pegawai yang cocok dengan pencarian.</div>';return;}
  grid.innerHTML=list.map(p=>{
    const tags=KATEGORI_ALL.map(k=>{
      const has=p.kategori.includes(k);
      const lnk=p.sub&&p.sub[k];
      if(has&&lnk) return `<a class="tag clickable" href="${lnk}" target="_blank">${k}</a>`;
      if(has) return `<span class="tag">${k}</span>`;
      return `<span class="tag missing">${k}</span>`;
    }).join("");
    return `<div class="card">
      <div class="card-header">${avatarHTML(p)}<div><div class="card-name">${p.nama}</div><div class="card-sub">${p.jabatan}</div></div></div>
      <hr class="divider">
      <div class="cat-label">Kategori Berkas <span style="font-weight:400;opacity:.6;">(klik untuk buka)</span></div>
      <div class="tags">${tags}</div>
      <a class="folder-btn" href="${p.link}" target="_blank">📁 &nbsp;Buka Dosir ${p.nama}</a>
    </div>`;
  }).join("");
}
function filterCards(){
  const q=document.getElementById("searchInput").value.toLowerCase().trim();
  let list=pegawai;
  if(q) list=list.filter(p=>p.nama.toLowerCase().includes(q)||p.jabatan.toLowerCase().includes(q));
  if(activeFilter) list=list.filter(p=>p.kategori.includes(activeFilter));
  renderCards(list);
}
function initFilters(){
  document.getElementById("filterRow").innerHTML=
    `<button class="filter-btn active" onclick="setFilter(null,this)">Semua</button>`+
    KATEGORI_ALL.map(k=>`<button class="filter-btn" onclick="setFilter('${k}',this)">${k}</button>`).join("");
}
function setFilter(val,btn){
  activeFilter=val;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  filterCards();
}
initFilters();renderCards(pegawai);
</script>
